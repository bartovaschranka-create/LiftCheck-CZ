<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>LiftControl CZ - obnova aplikace</title>
<style>
  :root{color-scheme:light dark;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  body{margin:0;min-height:100dvh;display:grid;place-items:center;background:#eef4fb;color:#0f172a;padding:24px}
  .box{width:min(100%,520px);background:#fff;border:1px solid #dbe6f2;border-radius:18px;padding:22px;box-shadow:0 16px 44px rgba(15,23,42,.12)}
  h1{margin:0 0 10px;font-size:1.35rem}
  p{margin:0 0 14px;line-height:1.5;color:#475569}
  .status{padding:12px 14px;border-radius:12px;background:#eff6ff;color:#1d4ed8;font-weight:700}
  a,button{display:inline-flex;margin-top:16px;border:0;border-radius:12px;background:#2563eb;color:#fff;padding:12px 14px;font-weight:700;text-decoration:none}
</style>
</head>
<body>
<main class="box">
  <h1>Obnova LiftControl CZ</h1>
  <p>Tato stránka vyčistí jen aplikační cache a starý service worker. Uložená data aplikace nemaže.</p>
  <div class="status" id="status">Spouštím obnovu...</div>
  <a id="fallbackLink" href="./index.html?v=5.276&reset=manual" hidden>Pokračovat do aplikace</a>
</main>
<script>
(async function(){
  const status = document.getElementById('status');
  const fallback = document.getElementById('fallbackLink');
  const go = () => {
    const url = new URL('./index.html', location.href);
    url.searchParams.set('v','5.276');
    url.searchParams.set('reset', String(Date.now()));
    location.replace(url.toString());
  };
  try{
    status.textContent = 'Mažu aplikační cache...';
    if(window.caches){
      const keys = await caches.keys();
      await Promise.all(keys.filter(key => /^liftcontrol-cz-/i.test(key)).map(key => caches.delete(key)));
    }
    status.textContent = 'Odpojuji starý service worker...';
    if(navigator.serviceWorker?.getRegistrations){
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(reg => reg.unregister().catch(() => false)));
    }
    status.textContent = 'Hotovo, načítám novou verzi 5.276...';
    setTimeout(go, 600);
  }catch(err){
    status.textContent = 'Obnova se nepovedla automaticky. Klepni na Pokračovat do aplikace.';
    fallback.hidden = false;
  }
})();
</script>
</body>
</html>
